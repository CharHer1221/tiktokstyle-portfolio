<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>charlanne.work</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --lime: #C8FF00;
    --black: #080808;
    --dark: #111111;
    --mid: #1a1a1a;
    --white: #f0f0f0;
    --muted: #555;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--black);
    color: var(--white);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    overscroll-behavior: none;
  }

  /* ── FEED ── */
  #feed {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  #feed::-webkit-scrollbar { display: none; }

  /* ── CARD ── */
  .card {
    position: relative;
    height: 100vh;
    width: 100%;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    display: flex;
  }

  /* ── CARD FRAME (clips content, holds gradient/grain on mobile) ── */
  .card-frame {
    position: absolute;
    inset: 0;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    background: var(--dark);
  }

  /* ── GRADIENT + GRAIN ── */
  .card-frame::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top,
      rgba(8,8,8,0.96) 0%,
      rgba(8,8,8,0.55) 30%,
      rgba(8,8,8,0.1) 60%,
      transparent 100%);
    pointer-events: none;
    z-index: 2;
  }
  .card-frame::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 3;
    opacity: 0.35;
  }

  /* ── CAROUSEL TRACK ── */
  .carousel {
    position: absolute;
    inset: 0;
    display: flex;
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    z-index: 0;
    will-change: transform;
  }

  .carousel-slide {
    flex: 0 0 100vw;
    width: 100vw;
    height: 100%;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── MEDIA (image or video) ── */
  .card-media {
    display: block;
    z-index: 0;
    object-fit: cover;
  }

  /* Images: Instagram 4:5 (1080×1350) */
  .carousel-slide-image .card-media {
    width: min(100vw, calc(100vh * 4 / 5));
    aspect-ratio: 4 / 5;
    object-fit: cover;
  }

  /* Videos: 9:16 (1080×1920) */
  .carousel-slide-video .card-media {
    width: min(100vw, calc(100vh * 9 / 16));
    aspect-ratio: 9 / 16;
    object-fit: cover;
  }

  /* ── CAROUSEL DOTS ── */
  .carousel-dots {
    position: absolute;
    top: min(calc(50% + min(62.5vw, 50vh) + 10px), calc(100% - 130px));
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
    z-index: 10;
  }

  .carousel-dot {
    width: 6px;
    height: 6px;
    border-radius: 3px;
    background: rgba(240,240,240,0.35);
    transition: all 0.25s ease;
  }

  .carousel-dot.active {
    background: var(--lime);
    width: 20px;
  }

  /* Only show dots if carousel has multiple slides */
  .carousel[data-count="1"] ~ .carousel-dots { display: none; }

/* Desktop: show pointer cursor on carousel slides */
  @media (hover: hover) and (pointer: fine) {
    .carousel[data-count]:not([data-count="1"]) .carousel-slide { cursor: pointer; }
  }

  /* ── MUTE BUTTON ── */
  .mute-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    z-index: 20;
    width: 38px;
    height: 38px;
    background: rgba(8,8,8,0.65);
    border: 1px solid var(--lime);
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
  }
  .mute-btn:hover { background: rgba(200,255,0,0.12); transform: scale(1.05); }
  .mute-btn:active { transform: scale(0.9); }
  .card.has-video .mute-btn { display: flex; }
  .card.has-video.unmuted .mute-btn { border-color: rgba(255,255,255,0.2); }

  /* ── PLAY/PAUSE OVERLAY ── */
  .play-pause-overlay {
    position: absolute;
    inset: 0;
    z-index: 8;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .card:hover .play-pause-overlay { opacity: 1; pointer-events: auto; }
  .card.paused .play-pause-overlay { opacity: 1; pointer-events: auto; }
  .card:not(.has-video) .play-pause-overlay { display: none; }

  .play-pause-btn {
    width: 64px;
    height: 64px;
    background: rgba(8,8,8,0.6);
    border: 2px solid var(--lime);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(12px);
    transition: transform 0.15s, background 0.15s;
  }
  .play-pause-btn:hover { background: rgba(200,255,0,0.15); transform: scale(1.08); }
  .play-pause-btn:active { transform: scale(0.92); }

  /* ── CARD BOTTOM ── */
  .card-bottom {
    position: relative;
    z-index: 10;
    width: 100%;
    padding: 0 72px 36px 16px;
  }

  /* ── CAPTION ── */
  .caption {
    flex: 1;
    min-width: 0;
  }

  .caption-handle {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--lime);
    letter-spacing: 0.1em;
    margin-bottom: 5px;
    opacity: 0.9;
  }

  .caption-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(30px, 6vw, 44px);
    line-height: 0.95;
    color: var(--white);
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .caption-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 7px;
  }

  .caption-tag {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(240,240,240,0.6);
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .caption-tag:first-child {
    color: var(--lime);
    border-color: rgba(200,255,0,0.3);
    background: rgba(200,255,0,0.07);
  }

  .caption-hook {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: rgba(240,240,240,0.75);
    margin-top: 10px;
    line-height: 1.5;
    max-width: 280px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── ACTION SIDEBAR ── */
  .actions {
    position: absolute;
    right: 12px;
    bottom: calc(max(16px, 50vh - 62.5vw));
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .profile-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    margin-bottom: 4px;
    position: relative;
    cursor: pointer;
    text-decoration: none;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--mid);
    border: 2px solid var(--lime);
    overflow: hidden;
  }
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .follow-badge {
    position: absolute;
    bottom: -6px;
    width: 18px;
    height: 18px;
    background: var(--lime);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1.5px solid var(--black);
  }

  .action-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    user-select: none;
    background: none;
    border: none;
    color: var(--white);
    padding: 4px;
    transition: transform 0.15s;
  }
  .action-btn:active { transform: scale(0.88); }

  .action-icon {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
  }
  .action-btn:hover .action-icon {
    transform: scale(1.12);
  }
  .action-btn.liked svg {
    fill: var(--lime);
    stroke: var(--lime);
  }

  .action-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: rgba(240,240,240,0.7);
    letter-spacing: 0.05em;
  }

  /* ── PROGRESS DOTS (right edge) ── */
  #dots {
    position: fixed;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 100;
  }
  .dot {
    width: 3px;
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.2);
    transition: all 0.3s ease;
  }
  .dot.active {
    background: var(--lime);
    height: 16px;
  }

  /* ── SCROLL HINT ── */
  #scroll-hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    animation: bounce 2s ease-in-out infinite;
    pointer-events: none;
    opacity: 0.5;
    transition: opacity 0.5s;
  }
  #scroll-hint.hidden { opacity: 0; }
  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-6px); }
  }
  #scroll-hint span {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--lime);
    text-transform: uppercase;
  }

  /* ── SOUND BANNER ── */
  #sound-banner {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(8,8,8,0.85);
    border: 1px solid var(--lime);
    border-radius: 40px;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 150;
    backdrop-filter: blur(16px);
    cursor: pointer;
    transition: opacity 0.4s, transform 0.4s;
    animation: pulse-border 2s ease-in-out infinite;
  }
  #sound-banner.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translate(-50%, -50%) scale(0.7);
  }
  #sound-banner.shrinking {
    transition: opacity 0.5s, transform 0.5s;
  }
  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 0 0 rgba(200,255,0,0.3); }
    50% { box-shadow: 0 0 0 10px rgba(200,255,0,0); }
  }
  #sound-banner span {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--lime);
    text-transform: uppercase;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: var(--lime);
    color: var(--black);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    padding: 10px 20px;
    border-radius: 20px;
    z-index: 200;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── COMMENT DRAWER ── */
  #comment-drawer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 60vh;
    background: var(--dark);
    border-top: 1px solid rgba(200,255,0,0.2);
    border-radius: 20px 20px 0 0;
    z-index: 300;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    display: flex;
    flex-direction: column;
  }
  #comment-drawer.open { transform: translateY(0); }

  .drawer-handle {
    width: 40px; height: 4px;
    background: var(--muted);
    border-radius: 2px;
    margin: 14px auto 0;
    flex-shrink: 0;
  }
  .drawer-header {
    padding: 16px 20px 12px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.06em;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .drawer-close {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 18px; padding: 4px; line-height: 1;
  }
  .comments-list {
    flex: 1; overflow-y: auto;
    padding: 16px 20px;
    display: flex; flex-direction: column; gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--mid) transparent;
  }
  .comment-item { display: flex; gap: 12px; align-items: flex-start; }
  .comment-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--mid); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .comment-body { flex: 1; }
  .comment-name {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--lime); margin-bottom: 3px; letter-spacing: 0.05em;
  }
  .comment-text {
    font-family: 'DM Mono', monospace; font-size: 13px;
    color: rgba(240,240,240,0.8); line-height: 1.5;
  }
  .comment-input-row {
    padding: 12px 20px 24px;
    display: flex; flex-direction: column; gap: 8px;
    border-top: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .comment-input-row-bottom {
    display: flex; gap: 10px;
  }
  .comment-delete {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 13px; padding: 4px 6px;
    flex-shrink: 0; line-height: 1;
    transition: color 0.15s;
  }
  .comment-delete:hover { color: var(--white); }
  .comment-input {
    flex: 1;
    background: var(--mid);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 10px 16px;
    color: var(--white);
    font-family: 'DM Mono', monospace; font-size: 13px;
    outline: none; transition: border-color 0.2s;
  }
  #comment-name {
    font-size: 11px;
    padding: 7px 14px;
    border-radius: 14px;
    opacity: 0.7;
  }
  #comment-input {
    font-size: 14px;
    padding: 12px 16px;
  }
  .comment-input:focus { border-color: var(--lime); opacity: 1; }
  .comment-input::placeholder { color: var(--muted); }
  .comment-send {
    width: 40px; height: 40px;
    background: var(--lime); border: none; border-radius: 50%;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: transform 0.15s;
  }
  .comment-send:active { transform: scale(0.9); }

  /* ── BACKDROP ── */
  #backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 250; opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  #backdrop.show { opacity: 1; pointer-events: auto; }

  /* ── CARD PLACEHOLDER (no media) ── */
  .card-placeholder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center; z-index: 0;
  }
  .card-placeholder span {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;
  }

  /* ── HAMBURGER BUTTON ── */
  #hamburger-btn {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 400; /* above sidebar (z-index 300) so X stays visible when open */
    width: 38px;
    height: 38px;
    background: rgba(8,8,8,0.65);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--white);
    backdrop-filter: blur(10px);
    transition: border-color 0.2s, background 0.2s;
  }
  #hamburger-btn:hover { background: rgba(200,255,0,0.1); border-color: var(--lime); }
  /* Icon swap: show X when open */
  #hamburger-btn.open .icon-menu  { display: none; }
  #hamburger-btn.open .icon-close { display: block !important; }

  /* ── MOBILE SIDEBAR BACKDROP ── */
  #mobile-sidebar-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    display: block;
  }
  #mobile-sidebar-backdrop.open {
    opacity: 1;
    pointer-events: auto;
  }

  /* ── SIDEBAR (shared mobile slide-in + desktop fixed) ── */
  #desktop-sidebar {
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    width: 260px;
    background: var(--black);
    border-right: 1px solid rgba(255,255,255,0.07);
    z-index: 300;
    display: flex;
    flex-direction: column;
    padding: 32px 24px;
    overflow-y: auto;
    transform: translateY(-100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  }
  #desktop-sidebar.open {
    transform: translateY(0);
  }

  /* ── SIDEBAR CONTENT STYLES ── */
  .sidebar-logo {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--lime);
    margin-bottom: 12px;
  }
  .sidebar-name {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.03em;
    text-transform: lowercase;
  }
  .sidebar-tagline {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--lime);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 4px;
    opacity: 0.85;
  }
  .sidebar-divider {
    width: 100%;
    height: 1px;
    background: rgba(255,255,255,0.1);
    margin: 20px 0;
  }
  .sidebar-links {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .sidebar-link {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: rgba(240,240,240,0.6);
    text-decoration: none;
    padding: 8px 10px;
    border-radius: 8px;
    letter-spacing: 0.05em;
    transition: color 0.2s, background 0.2s;
  }
  .sidebar-link:hover {
    color: var(--lime);
    background: rgba(200,255,0,0.07);
  }
  .sidebar-link svg { flex-shrink: 0; opacity: 0.7; }
  .sidebar-link:hover svg { opacity: 1; }

  /* ════════════════════════════════════════════
     DESKTOP LAYOUT  (≥ 900px)
     ════════════════════════════════════════════ */
  @media (min-width: 900px) {

    /* ── PAGE LAYOUT ── */
    body {
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    /* ── LEFT SIDEBAR ── */
    /* Sidebar width: 240px on desktop. #feed margin-left MUST match this value. */
    #desktop-sidebar {
      display: flex;
      flex-direction: column;
      width: 240px;
      flex-shrink: 0;
      height: 100vh;
      padding: 32px 24px;
      border-right: 1px solid rgba(255,255,255,0.07);
      position: fixed;
      left: 0;
      top: 0;
      z-index: 100;
      background: var(--black);
      overflow-y: auto;
      transform: none;
    }

    /* ── FEED (center column) ── */
    /* margin-left MUST match #desktop-sidebar width above */
    #feed {
      margin-left: 240px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    /* ── CARD (desktop: flex row, transparent shell) ── */
    .card {
      width: auto;
      height: 100vh;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: transparent;
      overflow: visible;
      flex-shrink: 0;
    }

    /* ── CARD FRAME (the visible rounded card) ── */
    .card-frame {
      position: relative;
      inset: auto;
      width: 390px;
      height: calc(100vh - 48px);
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* ── CAROUSEL SLIDES: fixed width on desktop ── */
    .carousel-slide {
      flex: 0 0 390px;
      width: 390px;
    }

    /* Fill card frame with media on desktop */
    .carousel-slide-image .card-media,
    .carousel-slide-video .card-media {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── ACTIONS (outside card, to the right) ── */
    .actions {
      position: relative;
      right: auto;
      bottom: auto;
      z-index: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 72px;
    }

    /* ── HIDE MOBILE-ONLY UI ── */
    #hamburger-btn,
    #mobile-sidebar-backdrop { display: none; }

    /* ── PROGRESS DOTS ── */
    #dots { display: none; }

    /* ── SCROLL HINT ── */
    #scroll-hint { display: none; }

    /* ── CAROUSEL DOTS position for 390px card ── */
    .carousel-dots {
      top: min(calc(50% + min(195px, 50vh) + 10px), calc(100% - 80px));
    }

    /* ── CARD BOTTOM text padding ── */
    .card-bottom {
      padding: 0 16px 36px 16px;
    }

  /* ── COMMENT DRAWER → right-side panel on desktop ── */
  #comment-drawer {
    top: 0;
    left: auto;
    right: 0;
    bottom: 0;
    width: 380px;
    height: 100vh;
    border-top: none;
    border-left: 1px solid rgba(200,255,0,0.15);
    border-radius: 0;
    transform: translateX(100%);
  }
  #comment-drawer.open {
    transform: translateX(0);
  }

  /* Hide the drag handle on desktop */
  .drawer-handle { display: none; }

  /* Lighter backdrop on desktop */
  #backdrop {
    background: rgba(0,0,0,0.3);
  }
  }
</style>

<script>
// ── HELPERS ──
function isVideo(src) {
  return /\.(mp4|webm|mov)(\?|$)/i.test(src);
}


// ── STATE ──
const state = {
  likes: {},
  likeCounts: {},
  commentsByCard: {},
  currentCard: 0,
  activeCommentCard: null,
  carouselIndex: {},
};

// ── PERSISTENCE ──
const _savedLikes    = JSON.parse(localStorage.getItem('pf_likes')    || '{}');
const _savedCounts   = JSON.parse(localStorage.getItem('pf_counts')   || '{}');
const _savedComments = JSON.parse(localStorage.getItem('pf_comments') || '{}');

function saveToStorage() {
  localStorage.setItem('pf_likes',    JSON.stringify(state.likes));
  localStorage.setItem('pf_counts',   JSON.stringify(state.likeCounts));
  localStorage.setItem('pf_comments', JSON.stringify(state.commentsByCard));
}

PROJECTS.forEach(p => {
  state.likes[p.id]          = _savedLikes[p.id]    || false;
  state.likeCounts[p.id]     = _savedCounts[p.id]   ?? 0;
  state.commentsByCard[p.id] = _savedComments[p.id] || [];
  state.carouselIndex[p.id]  = 0;
});

// ── BUILD FEED ──
const feed = document.getElementById('feed');
const dotsEl = document.getElementById('dots');

PROJECTS.forEach((p, i) => {
  // Progress dot
  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.dataset.index = i;
  dotsEl.appendChild(dot);

  // Normalise media to array
  const mediaList = Array.isArray(p.media) ? p.media : (p.media ? [p.media] : []);
  const hasVid = mediaList.some(isVideo);
  const isCarousel = mediaList.length > 1;

  const card = document.createElement('div');
  card.className = ['card', hasVid ? 'has-video' : '', mediaList.length ? 'has-media' : ''].filter(Boolean).join(' ');
  card.dataset.id = p.id;
  card.dataset.index = i;

  // Build carousel HTML
  let carouselHTML = '';
  if (mediaList.length === 0) {
    carouselHTML = `<div class="card-placeholder"><span>no media yet</span></div>`;
  } else {
    const slides = mediaList.map(src => {
      if (isVideo(src)) {
        return `<div class="carousel-slide carousel-slide-video">
          <video class="card-media" loop muted playsinline preload="metadata">
            <source src="${src}" type="video/mp4">
          </video>
        </div>`;
      } else {
        return `<div class="carousel-slide carousel-slide-image">
          <img class="card-media" src="${src}" alt="${p.title}" loading="lazy">
        </div>`;
      }
    }).join('');

    carouselHTML = `
      <div class="carousel" data-id="${p.id}" data-count="${mediaList.length}" style="width:${mediaList.length * 100}%">
        ${slides}
      </div>
      ${isCarousel ? `
        <div class="carousel-dots">
          ${mediaList.map((_, di) => `<div class="carousel-dot ${di === 0 ? 'active' : ''}" data-card="${p.id}" data-dot="${di}"></div>`).join('')}
        </div>
` : ''}
    `;
  }

  // Build tags HTML
  const tagsHTML = p.tags && p.tags.length
    ? `<div class="caption-tags">${p.tags.map(t => `<span class="caption-tag">${t}</span>`).join('')}</div>`
    : '';

  card.innerHTML = `
    <div class="card-frame">
      ${carouselHTML}

      ${hasVid ? `
      <button class="mute-btn" data-id="${p.id}">
        <svg class="icon-muted" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#C8FF00" stroke-width="2">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
        </svg>
        <svg class="icon-unmuted" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#f0f0f0" stroke-width="2" style="display:none">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
      <div class="play-pause-overlay">
        <button class="play-pause-btn" data-id="${p.id}">
          <svg class="icon-pause" width="22" height="22" viewBox="0 0 24 24" fill="var(--lime)" stroke="none">
            <rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>
          </svg>
          <svg class="icon-play" width="22" height="22" viewBox="0 0 24 24" fill="var(--lime)" stroke="none" style="display:none;margin-left:3px">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </button>
      </div>` : ''}

      <div class="card-bottom">
        <div class="caption">
          <div class="caption-handle">@charlanne.work</div>
          <div class="caption-title">${p.title}</div>
          ${tagsHTML}
          <div class="caption-hook">${p.caption}</div>
        </div>
      </div>
    </div>

    <div class="actions">
      ${p.url ? `
      <button class="action-btn visit-btn" data-url="${p.url}">
        <div class="action-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
        </div>
        <span class="action-count">view</span>
      </button>` : ''}
      <a class="profile-btn" href="https://www.charlanne.work" target="_blank" rel="noopener">
        <div class="avatar"><img src="media/cperiod256.png" alt="charlanne.work"></div>
      </a>
      <button class="action-btn like-btn" data-id="${p.id}">
        <div class="action-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
        <span class="action-count like-count" data-id="${p.id}">${state.likeCounts[p.id]}</span>
      </button>
      <button class="action-btn comment-btn" data-id="${p.id}">
        <div class="action-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <span class="action-count comment-count" data-id="${p.id}">0</span>
      </button>
    </div>
  `;

  feed.appendChild(card);
});


// ── CAROUSEL TOUCH/MOUSE SWIPE ──
document.querySelectorAll('.carousel').forEach(carousel => {
  const id = parseInt(carousel.dataset.id);
  const count = parseInt(carousel.dataset.count);
  if (count <= 1) return;

  let startX = 0, startY = 0, isDragging = false;
  const threshold = 50;

  function goTo(idx) {
    state.carouselIndex[id] = Math.max(0, Math.min(idx, count - 1));
    const pct = state.carouselIndex[id] * (100 / count);
    carousel.style.transform = `translateX(-${pct}%)`;
    // Update dots
    document.querySelectorAll(`.carousel-dot[data-card="${id}"]`).forEach((d, i) => {
      d.classList.toggle('active', i === state.carouselIndex[id]);
    });
  }

  // Touch
  carousel.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isDragging = true;
  }, { passive: true });

  carousel.addEventListener('touchend', e => {
    if (!isDragging) return;
    isDragging = false;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    // Only horizontal swipes — don't interfere with vertical feed scroll
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > threshold) {
      goTo(state.carouselIndex[id] + (dx < 0 ? 1 : -1));
    }
  }, { passive: true });

  // Mouse drag (desktop)
  carousel.addEventListener('mousedown', e => {
    startX = e.clientX;
    isDragging = true;
    carousel.style.cursor = 'grabbing';
  });
  window.addEventListener('mouseup', e => {
    if (!isDragging) return;
    isDragging = false;
    carousel.style.cursor = '';
    const dx = e.clientX - startX;
    if (Math.abs(dx) > threshold) {
      goTo(state.carouselIndex[id] + (dx < 0 ? 1 : -1));
    }
  });
});


// ── SCROLL TRACKING ──
const scrollHint = document.getElementById('scroll-hint');
let scrolled = false;

const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    const card = e.target;
    const video = card.querySelector('video.card-media');
    if (e.isIntersecting) {
      const idx = parseInt(card.dataset.index);
      state.currentCard = idx;
      document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
      if (idx > 0 && !scrolled) { scrolled = true; scrollHint.classList.add('hidden'); }
      // Pause & mute every other video before playing this one
      document.querySelectorAll('video.card-media').forEach(v => {
        if (v !== video) { v.pause(); v.muted = true; }
      });
      if (video) { video.muted = globalMuted; video.play().catch(() => {}); }
    } else {
      if (video) { video.pause(); video.muted = true; }
    }
  });
}, { threshold: 0.6 });

document.querySelectorAll('.card').forEach(c => observer.observe(c));

// ── LIKES ──
document.addEventListener('click', e => {
  const btn = e.target.closest('.like-btn');
  if (!btn) return;
  const id = parseInt(btn.dataset.id);
  state.likes[id] = !state.likes[id];
  state.likeCounts[id] += state.likes[id] ? 1 : -1;
  btn.classList.toggle('liked', state.likes[id]);
  document.querySelectorAll(`.like-count[data-id="${id}"]`).forEach(el => el.textContent = state.likeCounts[id]);
  if (state.likes[id]) {
    const icon = btn.querySelector('.action-icon');
    icon.style.transform = 'scale(1.35)';
    setTimeout(() => icon.style.transform = '', 200);
  }
  saveToStorage();
});


// ── VISIT ──
document.addEventListener('click', e => {
  const btn = e.target.closest('.visit-btn');
  if (!btn) return;
  window.open(btn.dataset.url, '_blank');
});

// ── PLAY / PAUSE ──
document.addEventListener('click', e => {
  const btn = e.target.closest('.play-pause-btn');
  if (!btn) return;
  const id = parseInt(btn.dataset.id);
  const card = document.querySelector(`.card[data-id="${id}"]`);
  const video = card.querySelector('video.card-media');
  if (!video) return;
  if (video.paused) {
    video.play();
    card.classList.remove('paused');
    btn.querySelector('.icon-pause').style.display = '';
    btn.querySelector('.icon-play').style.display = 'none';
  } else {
    video.pause();
    card.classList.add('paused');
    btn.querySelector('.icon-pause').style.display = 'none';
    btn.querySelector('.icon-play').style.display = '';
  }
});

// ── MUTE / UNMUTE ──
let globalMuted = true;
const soundBanner = document.getElementById('sound-banner');
const hasAnyVideo = PROJECTS.some(p => {
  const m = Array.isArray(p.media) ? p.media : [p.media];
  return m.some(isVideo);
});
if (!hasAnyVideo) soundBanner.classList.add('hidden');

// Auto-hide sound banner after 2.5s
if (hasAnyVideo) {
  setTimeout(() => {
    soundBanner.classList.add('shrinking');
    soundBanner.classList.add('hidden');
  }, 2500);
}

function setMute(muted) {
  globalMuted = muted;
  // Only affect the currently visible card's video
  const currentCard = document.querySelector(`.card[data-index="${state.currentCard}"]`);
  const currentVideo = currentCard ? currentCard.querySelector('video.card-media') : null;
  if (currentVideo) {
    currentVideo.muted = muted;
    if (currentVideo.paused) currentVideo.play().catch(() => {});
  }
  document.querySelectorAll('.card.has-video').forEach(c => c.classList.toggle('unmuted', !muted));
  document.querySelectorAll('.mute-btn').forEach(b => {
    b.querySelector('.icon-muted').style.display = muted ? '' : 'none';
    b.querySelector('.icon-unmuted').style.display = muted ? 'none' : '';
  });
  if (!muted) { soundBanner.classList.add('hidden'); showToast('🔊 sound on'); }
  else showToast('🔇 muted');
}

soundBanner.addEventListener('click', () => setMute(false));
document.addEventListener('click', e => {
  const btn = e.target.closest('.mute-btn');
  if (!btn) return;
  e.stopPropagation();
  setMute(!globalMuted);
});

// ── COMMENTS ──
const drawer = document.getElementById('comment-drawer');
const backdrop = document.getElementById('backdrop');
const commentsList = document.getElementById('comments-list');
const commentInput = document.getElementById('comment-input');

function openComments(id) {
  state.activeCommentCard = id;
  document.querySelector('.drawer-header span').textContent = `COMMENTS  ${(state.commentsByCard[id] || []).length}`;
  renderComments(id);
  drawer.classList.add('open');
  backdrop.classList.add('show');
  setTimeout(() => commentInput.focus(), 400);
}

function closeComments() {
  drawer.classList.remove('open');
  backdrop.classList.remove('show');
  state.activeCommentCard = null;
  commentInput.value = '';
}

document.addEventListener('click', e => {
  const btn = e.target.closest('.comment-btn');
  if (btn) openComments(parseInt(btn.dataset.id));
});
document.getElementById('close-drawer').addEventListener('click', closeComments);
backdrop.addEventListener('click', closeComments);

function submitComment() {
  const nameInput = document.getElementById('comment-name');
  const name = nameInput.value.trim() || 'anonymous';
  const text = commentInput.value.trim();
  if (!text || !state.activeCommentCard) return;
  const id = state.activeCommentCard;
  state.commentsByCard[id].push({ name, text });
  commentInput.value = '';
  renderComments(id);
  document.querySelectorAll(`.comment-count[data-id="${id}"]`).forEach(el => {
    el.textContent = state.commentsByCard[id].length;
  });
  saveToStorage();
  showToast('comment posted ✓');
}

document.getElementById('comment-send').addEventListener('click', submitComment);
commentInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitComment(); });

// ── DELETE COMMENT ──
commentsList.addEventListener('click', e => {
  const btn = e.target.closest('.comment-delete');
  if (!btn || !state.activeCommentCard) return;
  const id = state.activeCommentCard;
  state.commentsByCard[id].splice(parseInt(btn.dataset.idx), 1);
  renderComments(id);
  document.querySelectorAll(`.comment-count[data-id="${id}"]`).forEach(el => {
    el.textContent = state.commentsByCard[id].length;
  });
  saveToStorage();
});

function renderComments(id) {
  const comments = state.commentsByCard[id];
  // Refresh header count
  const drawerHeader = document.querySelector('.drawer-header span');
  if (drawerHeader) drawerHeader.textContent = `COMMENTS  ${comments.length}`;
  if (!comments.length) {
    commentsList.innerHTML = `<div style="color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;letter-spacing:0.06em;text-align:center;padding:40px 0">no comments yet.<br>be the first.</div>`;
    return;
  }
  commentsList.innerHTML = comments.map((c, i) => `
    <div class="comment-item">
      <div class="comment-avatar">${(c.name||'AN').slice(0,2).toUpperCase()}</div>
      <div class="comment-body">
        <div class="comment-name">${c.name.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>
        <div class="comment-text">${c.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>
      </div>
      <button class="comment-delete" data-idx="${i}">✕</button>
    </div>`).join('');
  commentsList.scrollTop = commentsList.scrollHeight;
}

// ── CLICK-TO-ADVANCE CAROUSEL (desktop) ──
document.addEventListener('click', e => {
  // Only on non-touch devices
  if (!matchMedia('(hover: hover) and (pointer: fine)').matches) return;
  const slide = e.target.closest('.carousel-slide');
  if (!slide) return;
  // Don't trigger if clicking a button inside the slide
  if (e.target.closest('button, a')) return;
  const carousel = slide.closest('.carousel');
  if (!carousel || parseInt(carousel.dataset.count) <= 1) return;
  const id = parseInt(carousel.dataset.id);
  const count = parseInt(carousel.dataset.count);
  const newIdx = Math.min(state.carouselIndex[id] + 1, count - 1);
  state.carouselIndex[id] = newIdx;
  const pct = newIdx * (100 / count);
  carousel.style.transform = `translateX(-${pct}%)`;
  document.querySelectorAll(`.carousel-dot[data-card="${id}"]`).forEach((d, i) => d.classList.toggle('active', i === newIdx));
});

// ── KEYBOARD NAV ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  // Left/right: navigate carousel on current card
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    const card = document.querySelector(`.card[data-index="${state.currentCard}"]`);
    const carousel = card?.querySelector('.carousel');
    if (!carousel || parseInt(carousel.dataset.count) <= 1) return;
    const id = parseInt(carousel.dataset.id);
    const count = parseInt(carousel.dataset.count);
    const dir = e.key === 'ArrowRight' ? 1 : -1;
    const newIdx = Math.max(0, Math.min(state.carouselIndex[id] + dir, count - 1));
    state.carouselIndex[id] = newIdx;
    carousel.style.transform = `translateX(-${newIdx * (100 / count)}%)`;
    document.querySelectorAll(`.carousel-dot[data-card="${id}"]`).forEach((d, i) => d.classList.toggle('active', i === newIdx));
    return;
  }
  // Up/down: scroll feed
  if (e.key === 'ArrowDown' || e.key === 'j') {
    document.querySelectorAll('.card')[Math.min(state.currentCard + 1, PROJECTS.length - 1)]?.scrollIntoView({ behavior: 'smooth' });
  }
  if (e.key === 'ArrowUp' || e.key === 'k') {
    document.querySelectorAll('.card')[Math.max(state.currentCard - 1, 0)]?.scrollIntoView({ behavior: 'smooth' });
  }
});

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── HAMBURGER MENU ──
const hamburgerBtn = document.getElementById('hamburger-btn');
const mobileSidebarBackdrop = document.getElementById('mobile-sidebar-backdrop');
const desktopSidebar = document.getElementById('desktop-sidebar');

function openSidebar() {
  desktopSidebar.classList.add('open');
  mobileSidebarBackdrop.classList.add('open');
  document.getElementById('feed').style.overflow = 'hidden';
  if (hamburgerBtn) {
    hamburgerBtn.classList.add('open');
    hamburgerBtn.setAttribute('aria-expanded', 'true');
    hamburgerBtn.setAttribute('aria-label', 'Close menu');
  }
}

function closeSidebar() {
  desktopSidebar.classList.remove('open');
  mobileSidebarBackdrop.classList.remove('open');
  document.getElementById('feed').style.overflow = '';
  if (hamburgerBtn) {
    hamburgerBtn.classList.remove('open');
    hamburgerBtn.setAttribute('aria-expanded', 'false');
    hamburgerBtn.setAttribute('aria-label', 'Open menu');
  }
}

if (hamburgerBtn) hamburgerBtn.addEventListener('click', () => {
  desktopSidebar.classList.contains('open') ? closeSidebar() : openSidebar();
});
if (mobileSidebarBackdrop) mobileSidebarBackdrop.addEventListener('click', closeSidebar);
</script>
